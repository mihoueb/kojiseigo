<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事成語の旅 - 物語から学ぶ、古の知恵</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1410 0%, #2d1810 50%, #1a1410 100%);
            --gold: #d4af37;
            --gold-light: #f4e4c1;
            --card-bg: linear-gradient(135deg, rgba(46, 28, 16, 0.9) 0%, rgba(26, 20, 16, 0.9) 100%);
            --border-gold: rgba(212, 175, 55, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: "Noto Serif JP", "Yu Mincho", "YuMincho", serif;
            background: var(--bg-gradient);
            color: var(--gold-light);
            overflow-x: hidden;
        }

        /* 背景装飾 */
        .bg-decoration {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 69, 19, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ヘッダー */
        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 500;
            background: linear-gradient(135deg, #d4af37 0%, #f4e4c1 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .subtitle {
            color: rgba(244, 228, 193, 0.7);
            font-size: 1rem;
            letter-spacing: 0.2em;
        }

        /* 進捗表示 */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background: rgba(139, 69, 19, 0.2);
            border-radius: 12px;
            border: 1px solid var(--border-gold);
            margin-bottom: 2rem;
        }

        .progress-info { display: flex; align-items: center; gap: 0.5rem; }

        /* メインカード */
        .main-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(212, 175, 55, 0.1);
            border: 2px solid var(--border-gold);
            position: relative;
            min-height: 400px;
        }

        /* ストーリー表示 */
        .story-text {
            font-size: 1.4rem;
            line-height: 2.2;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 12px;
            border-left: 4px solid var(--gold);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
        }

        .story-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* インジケーター */
        .indicators {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .dot {
            height: 12px;
            border-radius: 6px;
            background: rgba(212, 175, 55, 0.2);
            transition: all 0.4s ease;
        }

        /* ボタン */
        .btn {
            background: linear-gradient(135deg, #d4af37 0%, #c9a961 100%);
            color: #1a1410;
            border: none;
            border-radius: 12px;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0 auto;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
        }

        /* クイズ・選択肢 */
        .choice-grid {
            display: grid;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .choice-btn {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            font-size: 1.3rem;
            color: var(--gold-light);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            font-family: inherit;
        }

        .choice-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            border-color: var(--gold);
            transform: translateX(8px);
        }

        /* 結果表示 */
        .result-header { text-align: center; margin-bottom: 2rem; }
        .result-icon { margin-bottom: 1rem; }
        
        .explanation-card {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-gold);
        }

        .explanation-idiom {
            font-size: 2.5rem;
            color: var(--gold);
            font-weight: 600;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .explanation-reading {
            text-align: center;
            color: rgba(244, 228, 193, 0.7);
            margin-bottom: 1.5rem;
        }

        .usage-box {
            padding-left: 1rem;
            border-left: 3px solid rgba(212, 175, 55, 0.3);
            margin-top: 1rem;
            color: rgba(244, 228, 193, 0.8);
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>
    <div class="bg-decoration"></div>

    <div class="container">
        <header>
            <h1>故事成語の旅</h1>
            <p class="subtitle">物語から学ぶ、古の知恵</p>
        </header>

        <div class="progress-bar">
            <div class="progress-info">
                <i data-lucide="book-open" size="20"></i>
                <span>問題 <span id="current-num">1</span> / <span id="total-num">5</span></span>
            </div>
            <div id="score-display" style="color: var(--gold); font-weight: 600;">
                正解: 0 / 0
            </div>
        </div>

        <main class="main-card" id="game-container">
            <div id="story-section">
                <div class="story-text" id="story-content"></div>
                <div class="indicators" id="step-indicators"></div>
                <button class="btn" id="next-step-btn">
                    <span>続きを読む</span>
                    <i data-lucide="chevron-right"></i>
                </button>
            </div>

            <div id="quiz-section" class="hidden">
                <h2 style="text-align: center; color: var(--gold); margin-bottom: 2.5rem;">この物語の故事成語は？</h2>
                <div class="choice-grid" id="choices-container"></div>
            </div>

            <div id="result-section" class="hidden">
                <div class="result-header">
                    <div id="result-icon-container"></div>
                    <h2 id="result-text" style="font-size: 2rem;"></h2>
                </div>
                
                <div class="explanation-card">
                    <div class="explanation-idiom" id="result-idiom"></div>
                    <div class="explanation-reading" id="result-reading"></div>
                    <div id="result-meaning"></div>
                    <div class="usage-box" id="result-usage"></div>
                </div>

                <div id="final-stats" class="hidden" style="text-align: center; background: rgba(212,175,55,0.15); padding: 2rem; border-radius: 12px; margin-bottom: 2rem;">
                    <h3 style="color: var(--gold); font-size: 1.8rem;">全問完了！</h3>
                    <p id="final-score-text" style="font-size: 1.5rem; margin: 1rem 0;"></p>
                    <button class="btn" onclick="restartGame()">
                        <i data-lucide="rotate-ccw"></i>
                        最初から始める
                    </button>
                </div>

                <button class="btn" id="next-question-btn">
                    <span>次の問題へ</span>
                    <i data-lucide="chevron-right"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        const SAMPLE_KOJISEIGO = [
            {
                id: 1,
                idiom: "矛盾",
                reading: "むじゅん",
                story: [
                    "昔、中国の楚の国に武器を売る商人がいました。",
                    "商人は矛（ほこ）を掲げて「この矛はどんな盾も突き通すことができる！」と叫びました。",
                    "次に盾を掲げて「この盾はどんな矛も防ぐことができる！」と叫びました。",
                    "すると、ある人が尋ねました。「では、その矛でその盾を突いたらどうなるのですか？」",
                    "商人は答えることができませんでした。"
                ],
                meaning: "話の前後が合わず、つじつまが合わないこと",
                usage: "彼の説明は矛盾だらけで信用できない",
                choices: ["矛盾", "誇張", "欺瞞", "虚構"]
            },
            {
                id: 2,
                idiom: "杞憂",
                reading: "きゆう",
                story: [
                    "昔、杞という国に住む人がいました。",
                    "その人は「天が落ちてきたらどうしよう」と心配し始めました。",
                    "「地が崩れたらどうしよう」とも思い、夜も眠れなくなりました。",
                    "友人が「天は気体の集まりだから落ちてこない。地も土の塊だから崩れない」と説明しました。",
                    "しかし、その人は「では、気体が散ってしまったら？土が沈んでしまったら？」とまた心配し続けました。"
                ],
                meaning: "心配する必要のないことを心配すること。取り越し苦労",
                usage: "試験の結果を心配しすぎるのは杞憂というものだ",
                choices: ["杞憂", "危惧", "懸念", "不安"]
            },
            {
                id: 3,
                idiom: "画竜点睛",
                reading: "がりょうてんせい",
                story: [
                    "中国南北朝時代、張僧繇という名高い画家がいました。",
                    "彼は寺院の壁に四匹の竜の絵を描きました。",
                    "しかし、どの竜にも瞳（ひとみ）を描きませんでした。",
                    "人々が「なぜ瞳を描かないのか」と尋ねると、彼は「瞳を描くと竜が飛び去ってしまう」と答えました。",
                    "人々が無理に頼んだので、二匹の竜に瞳を描き入れると、その二匹は天に昇って飛び去ってしまいました。"
                ],
                meaning: "最後の仕上げを加えて作品を完成させること。物事の最も重要な部分",
                usage: "この企画は画竜点睛を欠いている",
                choices: ["画竜点睛", "完璧無欠", "仕上之功", "極致到達"]
            },
            {
                id: 4,
                idiom: "呉越同舟",
                reading: "ごえつどうしゅう",
                story: [
                    "呉と越は、昔から仲の悪い隣国同士でした。",
                    "ある日、呉の人と越の人が同じ舟に乗り合わせました。",
                    "最初は互いに警戒し、敵対していました。",
                    "ところが、突然激しい嵐に襲われ、舟が転覆しそうになりました。",
                    "命の危機に直面すると、二人は協力して舟を守り、互いに助け合いました。"
                ],
                meaning: "敵同士や仲の悪い者同士が、同じ場所や状況に置かれること。また、危機に際して協力すること",
                usage: "競合企業との共同プロジェクトは、まさに呉越同舟の状況だ",
                choices: ["呉越同舟", "和解協力", "一時休戦", "共同戦線"]
            },
            {
                id: 5,
                idiom: "五十歩百歩",
                reading: "ごじっぽひゃっぽ",
                story: [
                    "孟子が梁の恵王に説きました。",
                    "「戦場で、五十歩逃げた兵士が、百歩逃げた兵士を臆病者だと笑いました。」",
                    "「しかし、五十歩逃げるのも百歩逃げるのも、逃げたことに変わりはありません。」",
                    "「王の政治と他国の政治を比べても同じです。」",
                    "「少し良いからといって、本質的には何も変わっていないのです。」"
                ],
                meaning: "程度の差はあっても、本質的には同じであること。大差ないこと",
                usage: "テストで60点も50点も五十歩百歩だ",
                choices: ["五十歩百歩", "大同小異", "似而非物", "同類相憐"]
            }
        ];

        let state = {
            currentIndex: 0,
            storyStep: 0,
            score: 0,
            answeredCount: 0
        };

        // 初期化
        function init() {
            lucide.createIcons();
            renderQuestion();
        }

        function renderQuestion() {
            const current = SAMPLE_KOJISEIGO[state.currentIndex];
            
            // UI更新
            document.getElementById('current-num').textContent = state.currentIndex + 1;
            document.getElementById('total-num').textContent = SAMPLE_KOJISEIGO.length;
            document.getElementById('score-display').textContent = `正解: ${state.score} / ${state.answeredCount}`;

            // ストーリーリセット
            state.storyStep = 0;
            showStoryStep();

            // セクション表示切り替え
            document.getElementById('story-section').classList.remove('hidden');
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('result-section').classList.add('hidden');
        }

        function showStoryStep() {
            const current = SAMPLE_KOJISEIGO[state.currentIndex];
            const content = document.getElementById('story-content');
            
            // アニメーション用リセット
            content.classList.remove('active');
            
            setTimeout(() => {
                content.textContent = current.story[state.storyStep];
                content.classList.add('active');
            }, 50);

            // インジケーター作成
            const indicators = document.getElementById('step-indicators');
            indicators.innerHTML = '';
            current.story.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.style.width = i === state.storyStep ? '32px' : '12px';
                dot.style.background = i <= state.storyStep 
                    ? 'linear-gradient(90deg, #d4af37, #f4e4c1)' 
                    : 'rgba(212, 175, 55, 0.2)';
                indicators.appendChild(dot);
            });

            // ボタンテキスト
            const btn = document.getElementById('next-step-btn');
            const btnText = btn.querySelector('span');
            if (state.storyStep < current.story.length - 1) {
                btnText.textContent = '続きを読む';
            } else {
                btnText.textContent = 'クイズに挑戦';
            }
        }

        // 続きを読む / クイズへ ボタン
        document.getElementById('next-step-btn').addEventListener('click', () => {
            const current = SAMPLE_KOJISEIGO[state.currentIndex];
            if (state.storyStep < current.story.length - 1) {
                state.storyStep++;
                showStoryStep();
            } else {
                showQuiz();
            }
        });

        function showQuiz() {
            document.getElementById('story-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');

            const current = SAMPLE_KOJISEIGO[state.currentIndex];
            const container = document.getElementById('choices-container');
            container.innerHTML = '';

            current.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice;
                btn.onclick = () => handleAnswer(choice);
                container.appendChild(btn);
            });
        }

        function handleAnswer(choice) {
            const current = SAMPLE_KOJISEIGO[state.currentIndex];
            const isCorrect = choice === current.idiom;
            
            state.answeredCount++;
            if (isCorrect) state.score++;

            // 結果表示
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');

            const iconContainer = document.getElementById('result-icon-container');
            const resultText = document.getElementById('result-text');
            
            if (isCorrect) {
                iconContainer.innerHTML = '<i data-lucide="check-circle" color="#4ade80" size="64"></i>';
                resultText.textContent = '正解！';
                resultText.style.color = '#4ade80';
            } else {
                iconContainer.innerHTML = '<i data-lucide="x-circle" color="#f87171" size="64"></i>';
                resultText.textContent = '不正解';
                resultText.style.color = '#f87171';
            }

            document.getElementById('result-idiom').textContent = current.idiom;
            document.getElementById('result-reading').textContent = current.reading;
            document.getElementById('result-meaning').innerHTML = `<strong style="color: var(--gold)">意味：</strong>${current.meaning}`;
            document.getElementById('result-usage').innerHTML = `<strong style="color: var(--gold)">用例：</strong>${current.usage}`;

            // 全問終了チェック
            const isFinished = state.currentIndex === SAMPLE_KOJISEIGO.length - 1;
            const nextBtn = document.getElementById('next-question-btn');
            const finalStats = document.getElementById('final-stats');

            if (isFinished) {
                nextBtn.classList.add('hidden');
                finalStats.classList.remove('hidden');
                document.getElementById('final-score-text').textContent = `最終スコア: ${state.score} / ${SAMPLE_KOJISEIGO.length}`;
            } else {
                nextBtn.classList.remove('hidden');
                finalStats.classList.add('hidden');
            }

            lucide.createIcons();
            document.getElementById('score-display').textContent = `正解: ${state.score} / ${state.answeredCount}`;
        }

        document.getElementById('next-question-btn').onclick = () => {
            state.currentIndex++;
            renderQuestion();
        };

        function restartGame() {
            state = {
                currentIndex: 0,
                storyStep: 0,
                score: 0,
                answeredCount: 0
            };
            renderQuestion();
        }

        window.onload = init;
    </script>
</body>
</html>
